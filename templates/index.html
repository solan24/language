<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English - Nepali Translation</title>
    <!-- Importing lightweight, modern icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #ec4899; /* Pink accent */
            --bg-gradient: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            color: var(--text-main);
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .translation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .translation-grid { grid-template-columns: 1fr; }
        }

        .input-box {
            display: flex;
            flex-direction: column;
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 5px;
        }

        .lang-label {
            font-weight: 600;
            color: var(--primary);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: inherit;
            color: var(--text-main);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        #outputText {
            background-color: #f8fafc;
            border-color: #e2e8f0;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 35px;
        }

        button.translate-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.25);
        }

        button.translate-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(236, 72, 153, 0.35);
        }
        
        button.translate-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        button.translate-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .copy-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 20px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 6px;
        }

        .copy-btn:hover {
            color: var(--primary);
            background-color: #f1f5f9;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .status-message {
            text-align: center;
            margin-top: 15px;
            color: #ef4444;
            min-height: 20px;
            font-weight: 500;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><i class="ph-fill ph-translate"></i> English - Nepali Translation</h1>
        
        <div class="translation-grid">
            <!-- English Input -->
            <div class="input-box">
                <div class="box-header">
                    <span class="lang-label"><i class="ph ph-text-aa"></i> English</span>
                </div>
                <textarea id="inputText" placeholder="Enter text to translate..."></textarea>
            </div>
            
            <!-- Nepali Output -->
            <div class="input-box">
                <div class="box-header">
                    <span class="lang-label"><i class="ph ph-globe-hemisphere-east"></i> Nepali (नेपाली)</span>
                    <button class="copy-btn" onclick="copyTranslation()" title="Copy to clipboard">
                        <i class="ph ph-copy" id="copyIcon"></i>
                    </button>
                </div>
                <textarea id="outputText" placeholder="Translation will appear here..." readonly></textarea>
            </div>
        </div>

        <div class="controls">
            <button class="translate-btn" id="translateBtn" onclick="translateText()">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Translate</span>
                <i class="ph-bold ph-arrow-right" id="arrowIcon"></i>
            </button>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        // Feature: Copy to Clipboard
        function copyTranslation() {
            const outputText = document.getElementById("outputText");
            if (!outputText.value) return;

            navigator.clipboard.writeText(outputText.value).then(() => {
                const icon = document.getElementById("copyIcon");
                icon.classList.replace("ph-copy", "ph-check");
                icon.style.color = "#10b981"; // Success green
                
                setTimeout(() => {
                    icon.classList.replace("ph-check", "ph-copy");
                    icon.style.color = ""; // Reset color
                }, 2000);
            });
        }

        // Feature: Translation Logic
        async function translateText() {
            const inputText = document.getElementById("inputText").value.trim();
            const outputText = document.getElementById("outputText");
            const translateBtn = document.getElementById("translateBtn");
            const spinner = document.getElementById("spinner");
            const btnText = document.getElementById("btnText");
            const arrowIcon = document.getElementById("arrowIcon");
            const statusMessage = document.getElementById("statusMessage");

            if (!inputText) {
                statusMessage.textContent = "Please enter some text to translate.";
                return;
            }

            // Start Loading State
            statusMessage.textContent = "";
            outputText.value = "";
            translateBtn.disabled = true;
            spinner.style.display = "inline-block";
            arrowIcon.style.display = "none";
            btnText.textContent = "Translating...";

            try {
                const response = await fetch("http://127.0.0.1:5000/translate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        text: inputText,
                        max_length: 128
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    outputText.value = data.translation;
                } else {
                    statusMessage.textContent = "Error: " + (data.error || "Failed to translate.");
                }
            } catch (error) {
                statusMessage.textContent = "Error connecting to backend. Is flask_app.py running?";
                console.error("Error:", error);
            } finally {
                // End Loading State
                translateBtn.disabled = false;
                spinner.style.display = "none";
                arrowIcon.style.display = "inline-block";
                btnText.textContent = "Translate";
            }
        }
    </script>
</body>
</html>
